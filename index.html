<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Protein Hunter</title>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/2.6.2/phaser.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-content">
            <img src="images/logo-amadori.png" alt="Amadori" class="splash-logo">
            
            <h1 class="splash-title">Protein Hunter</h1>
            
            <p class="splash-subtitle">
                Metti alla prova i tuoi riflessi<br>
                con la sfida Amadori.
            </p>
            
            <p class="splash-description">
                <span class="text-pink">Affetta le monete proteiche</span> e crea <span class="text-green">combo</span> per scalare<br>
                la classifica, <span class="text-yellow">evitando la dinamite</span> per non perdere<br>
                vite.
            </p>
            
            <button id="start-button">Gioca ora</button>
        </div>
        
        <img src="images/decorative-stripes.png" alt="" class="splash-stripes">
    </div>

    <div id="game"></div>
    <div id="score-container" class="hidden">
        <span id="score-value">0</span>
    </div>

    <!-- Game Over Popup -->
    <div id="game-over-popup" class="game-over-popup hidden">
        <div class="game-over-popup-box">
            <div class="game-over-header">
                <h2 class="game-over-title">Punteggio finale</h2>
                <p class="game-over-score" id="game-over-score-value">0</p>
            </div>
            <div class="game-over-form">
                <label class="game-over-label" for="game-over-nickname">Inserisci Nickname</label>
                <input type="text" id="game-over-nickname" class="game-over-input" placeholder="Inserisci nickname" maxlength="20">
            </div>
            <div class="game-over-buttons">
                <button type="button" id="game-over-leaderboard-btn" class="game-over-btn game-over-btn-outline">Vedi la classifica</button>
                <button type="button" id="game-over-play-again-btn" class="game-over-btn game-over-btn-primary">Gioca ancora</button>
            </div>
        </div>
    </div>

    <img src="images/decorative-stripes.png" alt="" class="game-stripes">

    <!-- Game Modules -->
    <script src="js/config.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/game-objects.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
